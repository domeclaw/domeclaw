name: Build

on:
  push:
    tags: [ "v*" ]

jobs:
  build-main:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate
        run: go generate ./...

      - name: Build domeclaw
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          output="domeclaw-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "build/${output}" ./cmd/picoclaw

      - name: Prepare archive
        run: |
          mkdir -p archive
          if [ "${{ matrix.os }}" = "windows" ]; then
            # For Windows, create ZIP archive
            cd build
            zip "../archive/domeclaw-${{ matrix.os }}-${{ matrix.arch }}.zip" domeclaw-*
            cd ..
          else
            # For Linux/macOS, create TGZ archive
            cp "build/domeclaw-${{ matrix.os }}-${{ matrix.arch }}" build/domeclaw
            tar -czvf "archive/domeclaw-${{ matrix.os }}-${{ matrix.arch }}.tgz" -C build domeclaw
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: domeclaw-${{ matrix.os }}-${{ matrix.arch }}
          path: archive/*

  build-launcher:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
            runner: ubuntu-latest
          - os: windows
            arch: amd64
            ext: ".exe"
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Generate
        run: go generate ./...

      - name: Build frontend for launcher
        run: |
          cd web/frontend
          pnpm install --no-frozen-lockfile
          pnpm build:backend

      - name: Build domeclaw-launcher
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "1"
        run: |
          output="domeclaw-launcher-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "build/${output}" ./web/backend

      - name: Prepare archive
        run: |
          mkdir -p archive
          if [ "${{ matrix.os }}" = "windows" ]; then
            # For Windows, create ZIP archive
            cd build
            zip "../archive/domeclaw-launcher-${{ matrix.os }}-${{ matrix.arch }}.zip" domeclaw-launcher-*
            cd ..
          else
            # For Linux/macOS, create TGZ archive
            cp "build/domeclaw-launcher-${{ matrix.os }}-${{ matrix.arch }}" build/domeclaw-launcher
            tar -czvf "archive/domeclaw-launcher-${{ matrix.os }}-${{ matrix.arch }}.tgz" -C build domeclaw-launcher
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: domeclaw-launcher-${{ matrix.os }}-${{ matrix.arch }}
          path: archive/*

  release:
    needs: [build-main, build-launcher]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download main app artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts-main
          pattern: domeclaw-*

      - name: Download launcher artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts-launcher
          pattern: domeclaw-launcher-*

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"

          # Collect all archives
          mkdir -p release
          
          # Copy main app archives
          for dir in artifacts-main/domeclaw-*; do
            if [ -d "$dir" ]; then
              cp "$dir"/* release/
            fi
          done
          
          # Copy launcher archives
          for dir in artifacts-launcher/domeclaw-launcher-*; do
            if [ -d "$dir" ]; then
              cp "$dir"/* release/
            fi
          done

          # Create release with archives
          gh release create "$tag" \
            --title "Release $tag" \
            release/*
