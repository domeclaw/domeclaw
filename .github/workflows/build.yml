name: Build

on:
  push:
    branches: [ "domeclaw" ]
    tags: [ "v*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate
        run: go generate ./...

      - name: Build domeclaw
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          output="domeclaw-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "build/${output}" ./cmd/picoclaw

      - name: Build domeclaw-launcher
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          output="domeclaw-launcher-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "build/${output}" ./cmd/picoclaw-launcher-tui

      - name: Prepare archive
        run: |
          mkdir -p archive
          if [ "${{ matrix.os }}" = "windows" ]; then
            # For Windows, create ZIP archive
            cd build
            zip "../archive/domeclaw-${{ matrix.os }}-${{ matrix.arch }}.zip" domeclaw-* domeclaw-launcher-*
            cd ..
          else
            # For Linux/macOS, create TGZ archive
            tar -czvf "archive/domeclaw-${{ matrix.os }}-${{ matrix.arch }}.tgz" -C build .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: domeclaw-${{ matrix.os }}-${{ matrix.arch }}
          path: archive/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: domeclaw-*

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"

          # Collect all archives
          mkdir -p release
          for dir in artifacts/domeclaw-*; do
            cp "$dir"/* release/
          done

          # Create release with archives
          gh release create "$tag" \
            --title "Release $tag" \
            release/*
