name: Build

on:
  push:
    tags: [ "v*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
            build_launcher: true
          - os: linux
            arch: arm64
            ext: ""
            build_launcher: false  # Skip launcher for arm64 due to CGO cross-compilation issues
          - os: darwin
            arch: arm64
            ext: ""
            build_launcher: true
          - os: windows
            arch: amd64
            ext: ".exe"
            build_launcher: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate
        run: go generate ./...

      - name: Build domeclaw
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          output="domeclaw-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "build/${output}" ./cmd/picoclaw

      - name: Setup Node.js and pnpm
        if: matrix.build_launcher
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        if: matrix.build_launcher
        run: npm install -g pnpm
      - name: Build frontend for launcher
        if: matrix.build_launcher
        run: |
          cd web/frontend
          pnpm install --no-frozen-lockfile
          pnpm build:backend
      - name: Build domeclaw-launcher
        if: matrix.build_launcher
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "1"
        run: |
          output="domeclaw-launcher-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "build/${output}" ./web/backend

      - name: Prepare archive
        run: |
          mkdir -p archive
          if [ "${{ matrix.os }}" = "windows" ]; then
            # For Windows, create ZIP archive
            cd build
            if [ "${{ matrix.build_launcher }}" = "true" ]; then
              zip "../archive/domeclaw-${{ matrix.os }}-${{ matrix.arch }}.zip" domeclaw-* domeclaw-launcher-*
            else
              zip "../archive/domeclaw-${{ matrix.os }}-${{ matrix.arch }}.zip" domeclaw-*
            fi
            cd ..
          else
            # For Linux/macOS, create TGZ archive
            if [ "${{ matrix.build_launcher }}" = "true" ]; then
              tar -czvf "archive/domeclaw-${{ matrix.os }}-${{ matrix.arch }}.tgz" -C build .
            else
              tar -czvf "archive/domeclaw-${{ matrix.os }}-${{ matrix.arch }}.tgz" -C build/domeclaw-${{ matrix.os }}-${{ matrix.arch }} --transform "s/domeclaw-${{ matrix.os }}-${{ matrix.arch }}/domeclaw/"
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: domeclaw-${{ matrix.os }}-${{ matrix.arch }}
          path: archive/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: domeclaw-*

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"

          # Collect all archives
          mkdir -p release
          for dir in artifacts/domeclaw-*; do
            cp "$dir"/* release/
          done

          # Create release with archives
          gh release create "$tag" \
            --title "Release $tag" \
            release/*
