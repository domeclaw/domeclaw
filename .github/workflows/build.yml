name: Build

on:
  push:
    tags: [ "v*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build Frontend
        working-directory: ./web/frontend
        run: |
          pnpm install
          pnpm build:backend

      - name: Generate
        run: go generate ./...

      - name: Build mclaw
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          output="mclaw-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "build/${output}" ./cmd/picoclaw

      - name: Build mclaw-launcher
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          output="mclaw-launcher-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "build/${output}" ./web/backend

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mclaw-${{ matrix.os }}-${{ matrix.arch }}
          path: build/mclaw-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: mclaw-*

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          
          # Collect all binaries
          mkdir -p release
          for dir in artifacts/mclaw-*; do
            cp "$dir"/mclaw-* release/
          done
          
          # Create release with binaries
          gh release create "$tag" \
            --title "Release $tag" \
            release/*
